<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Opepen World Cup — Which Opepen wins?</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700;800&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  /* ---------------------------------------------------------------------
     Opepen World Cup — self-contained voting app.
     Architecture mirrors the supplied Vite/Supabase reference:
     a single window.storage abstraction (get/set/list/delete). Here it is
     backed by localStorage so the file runs with no server. To make data
     shared across people, swap this shim for the Supabase storage.js from
     the reference repo and host as a Vite app — the rest of the app is
     written against the same window.storage interface.
  --------------------------------------------------------------------- */
  :root{
    --bg:#000;
    --fg:#f4f1ea;
    --muted:#8c8c8c;
    --muted-dim:#5a5a5a;
    --line:#262626;
    --line-strong:#3a3a3a;
    --green:#13a05a;
    --green-bright:#16b566;
    --red:#ff3b30;
    --pitch:rgba(255,255,255,.55);
    --sans:'Geist',system-ui,-apple-system,sans-serif;
    --mono:'Geist Mono',ui-monospace,SFMono-Regular,Menlo,monospace;
    --maxw:1320px;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{
    background:var(--bg);color:var(--fg);
    font-family:var(--sans);
    -webkit-font-smoothing:antialiased;
    min-height:100vh;
  }
  a{color:inherit;text-decoration:none}
  button{font-family:inherit;cursor:pointer}

  /* ---------- Ticker ---------- */
  .ticker{
    position:sticky;top:0;z-index:40;
    background:var(--bg);
    border-bottom:1px solid var(--line);
    overflow:hidden;white-space:nowrap;
    height:34px;display:flex;align-items:center;
  }
  .ticker__track{
    display:inline-flex;align-items:center;
    will-change:transform;
    animation:scroll 60s linear infinite;
    font-family:var(--mono);
    font-size:11px;letter-spacing:.12em;text-transform:uppercase;
    color:var(--muted);
  }
  .ticker__track span{padding:0 18px}
  .ticker__track .dot{color:var(--muted-dim);padding:0}
  .ticker:hover .ticker__track{animation-play-state:paused}
  @keyframes scroll{from{transform:translateX(0)}to{transform:translateX(-50%)}}

  /* ---------- Header ---------- */
  header{
    max-width:var(--maxw);margin:0 auto;
    padding:26px 28px 6px;
    display:flex;justify-content:space-between;align-items:flex-start;
  }
  .logo{display:block;height:78px;width:auto}
  nav{
    display:flex;flex-direction:column;align-items:flex-end;gap:9px;
    font-family:var(--mono);font-size:12px;letter-spacing:.14em;
    text-transform:uppercase;color:var(--muted);
  }
  nav a{transition:color .15s}
  nav a:hover,nav a.active{color:var(--fg)}

  /* ---------- Page frame ---------- */
  main{max-width:var(--maxw);margin:0 auto;padding:8px 28px 90px}
  .page-title{
    text-align:center;font-weight:700;font-size:54px;line-height:1.02;
    letter-spacing:-.02em;margin:34px 0 10px;
  }
  .page-sub{
    text-align:center;font-family:var(--mono);font-size:12px;
    letter-spacing:.16em;text-transform:uppercase;color:var(--muted);
    margin:0 0 30px;
  }
  .edition{
    text-align:center;font-family:var(--mono);font-size:12px;
    letter-spacing:.16em;text-transform:uppercase;color:var(--muted-dim);
    margin:36px 0 2px;
  }

  /* ---------- Pitch ---------- */
  .pitch-wrap{position:relative;width:100%;max-width:1216px;margin:0 auto;
    aspect-ratio:1216/541;}
  .pitch-imgs{position:absolute;inset:0;display:flex;overflow:hidden}
  .pitch-half{position:relative;height:100%;background-size:cover;background-position:center;
    transition:filter .15s, opacity .15s;}
  .pitch-svg{position:absolute;inset:0;width:100%;height:100%;pointer-events:none}
  .vote-zones{position:absolute;inset:0;display:flex;z-index:5}
  .vote-zone{flex:1;cursor:pointer}
  .pitch-wrap.votable .vote-zone:hover ~ .pitch-imgs .pitch-half{opacity:.7}
  /* hover dimming handled in JS for clarity */

  .empty-half{display:flex;align-items:center;justify-content:center;height:100%;
    font-family:var(--mono);font-size:11px;letter-spacing:.14em;text-transform:uppercase;
    color:var(--muted-dim);text-align:center;padding:20px;background:#0d0d0d}

  /* ---------- Scoreboard ---------- */
  .scoreboard{display:flex;justify-content:center;margin:40px auto 0}
  .scoreboard .box{border:1px solid var(--line-strong);display:flex;align-items:stretch}
  .sb-side{width:130px;display:flex;flex-direction:column;align-items:center;justify-content:center;
    padding:18px 0;}
  .sb-side .lbl{font-family:var(--mono);font-size:20px;letter-spacing:.04em;color:var(--fg)}
  .sb-side.btn{cursor:pointer;transition:background .15s}
  .sb-side.btn:hover{background:#111}
  .sb-mid{border-left:1px solid var(--line-strong);border-right:1px solid var(--line-strong);
    width:230px;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:14px 0}
  .sb-mid .cap{font-family:var(--mono);font-size:10px;letter-spacing:.16em;text-transform:uppercase;
    color:var(--muted-dim);margin-bottom:4px}
  .sb-mid .clock{font-size:46px;font-weight:600;letter-spacing:.01em;font-variant-numeric:tabular-nums}

  /* ---------- Results bar ---------- */
  .result-bar{display:flex;max-width:540px;margin:36px auto 0;border:1px solid var(--line-strong)}
  .result-bar .cell{flex:1;text-align:center;padding:16px 10px}
  .result-bar .cell.win{background:var(--green)}
  .result-bar .cell .lbl{font-size:22px;font-weight:600}
  .result-bar .cell .num{font-family:var(--mono);font-size:26px;margin-top:2px}
  .result-bar .cell.left .lbl,.result-bar .cell.left .num{color:#001a0e}
  .result-bar .cell.right{background:#000}
  .result-bar .cell.right .lbl,.result-bar .cell.right .num{color:var(--red)}

  /* ---------- Stats overlay ---------- */
  .stats-overlay{position:absolute;inset:0;background:rgba(19,160,90,.86);z-index:6;
    padding:30px 34px;}
  .stats-overlay table{font-family:var(--sans);color:#fff;font-size:19px;border-collapse:collapse}
  .stats-overlay td{padding:3px 0}
  .stats-overlay td.k{padding-right:48px;font-weight:500}
  .stats-overlay td.v{font-weight:400}

  /* ---------- Content pages ---------- */
  .prose{max-width:680px;margin:8px auto 0;font-size:16px;line-height:1.6}
  .prose h1{font-size:46px;font-weight:700;letter-spacing:-.02em;margin:30px 0 4px}
  .prose .eff{font-family:var(--mono);font-size:12px;letter-spacing:.08em;color:var(--muted);
    text-transform:uppercase;margin-bottom:30px}
  .prose h2{font-size:20px;font-weight:600;margin:30px 0 8px}
  .prose p{color:#d8d4cb;margin:0 0 14px}
  .prose a{text-decoration:underline;text-underline-offset:2px}

  /* ---------- Footer ---------- */
  footer{max-width:var(--maxw);margin:0 auto;padding:40px 28px 50px;
    display:flex;gap:26px;justify-content:center;
    font-family:var(--mono);font-size:12px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted)}
  footer a:hover{color:var(--fg)}

  /* ---------- Modal ---------- */
  .modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.78);z-index:100;
    display:flex;align-items:center;justify-content:center;padding:24px}
  .modal{background:#0b0b0b;border:1px solid var(--line-strong);width:100%;max-width:420px;
    padding:30px 30px 26px;position:relative}
  .modal h2{margin:0 0 4px;font-size:26px;font-weight:700;letter-spacing:-.01em}
  .modal p.lead{color:var(--muted);font-size:14px;margin:0 0 22px;line-height:1.5}
  .modal .close{position:absolute;top:14px;right:16px;background:none;border:none;color:var(--muted);
    font-size:20px;line-height:1}
  .modal label{display:block;font-family:var(--mono);font-size:11px;letter-spacing:.12em;
    text-transform:uppercase;color:var(--muted);margin:0 0 7px}
  .modal input[type=email],.modal input[type=text],.modal input[type=password],
  .modal input[type=number]{
    width:100%;background:#000;border:1px solid var(--line-strong);color:var(--fg);
    padding:12px 13px;font-family:var(--mono);font-size:14px;margin-bottom:16px;border-radius:0}
  .modal input:focus{outline:none;border-color:#666}
  .btn-primary{width:100%;background:var(--fg);color:#000;border:none;padding:13px;
    font-weight:600;font-size:15px;letter-spacing:.01em;transition:opacity .15s}
  .btn-primary:hover{opacity:.85}
  .btn-ghost{width:100%;background:#000;color:var(--fg);border:1px solid var(--line-strong);
    padding:13px;font-weight:500;font-size:15px;transition:border-color .15s}
  .btn-ghost:hover{border-color:#777}
  .divider{display:flex;align-items:center;gap:12px;margin:18px 0;color:var(--muted-dim);
    font-family:var(--mono);font-size:10px;letter-spacing:.16em}
  .divider::before,.divider::after{content:"";flex:1;height:1px;background:var(--line)}
  .who{font-family:var(--mono);font-size:11px;color:var(--muted);letter-spacing:.06em}
  .err{color:var(--red);font-family:var(--mono);font-size:12px;margin:-8px 0 14px}
  .note{color:var(--muted-dim);font-family:var(--mono);font-size:10.5px;line-height:1.5;
    letter-spacing:.04em;margin-top:14px}

  /* ---------- Admin ---------- */
  .admin{max-width:620px;margin:0 auto}
  .admin .row{display:flex;gap:16px;flex-wrap:wrap}
  .admin .row > div{flex:1;min-width:180px}
  .admin label{display:block;font-family:var(--mono);font-size:11px;letter-spacing:.12em;
    text-transform:uppercase;color:var(--muted);margin:18px 0 7px}
  .admin input[type=text],.admin input[type=number],.admin input[type=file]{
    width:100%;background:#000;border:1px solid var(--line-strong);color:var(--fg);
    padding:11px 12px;font-family:var(--mono);font-size:14px}
  .admin .thumb{width:100%;aspect-ratio:1/1;background:#0d0d0d;border:1px solid var(--line);
    margin-top:10px;background-size:cover;background-position:center;display:flex;
    align-items:center;justify-content:center;color:var(--muted-dim);font-family:var(--mono);font-size:11px}
  .admin .actions{display:flex;gap:12px;margin-top:28px;flex-wrap:wrap}
  .admin .actions button{flex:1;min-width:150px;padding:13px}
  .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);
    background:var(--green);color:#001a0e;font-weight:600;padding:12px 22px;z-index:200;
    font-size:14px;border-radius:0;opacity:0;transition:opacity .25s}
  .toast.show{opacity:1}

  .flash{position:fixed;top:44px;left:50%;transform:translateX(-50%);
    background:#0b0b0b;border:1px solid var(--line-strong);color:var(--fg);
    padding:11px 18px;font-family:var(--mono);font-size:12px;letter-spacing:.04em;z-index:90;
    opacity:0;transition:opacity .25s}
  .flash.show{opacity:1}

  @media(max-width:760px){
    .page-title{font-size:38px}
    .prose h1{font-size:34px}
    header{padding:20px 18px 4px}
    main{padding:8px 16px 70px}
    .logo{height:60px}
    .scoreboard .box{transform:scale(.92)}
    .sb-mid{width:180px}.sb-side{width:96px}
    .stats-overlay table{font-size:15px}
    .stats-overlay td.k{padding-right:24px}
  }
</style>
</head>

<script>
/* ============================================================
   window.storage — same interface as the reference repo's
   storage.js (get/set/list/delete). localStorage-backed here.
   ============================================================ */
const LS = (k)=>"owc:"+k;
window.storage = {
  get(key){ const v=localStorage.getItem(LS(key)); return v==null?null:{key,value:v}; },
  set(key,value){ localStorage.setItem(LS(key), value); return {key,value}; },
  delete(key){ localStorage.removeItem(LS(key)); return {key,deleted:true}; },
  list(prefix=""){ const out=[]; const pre=LS(prefix);
    for(let i=0;i<localStorage.length;i++){const k=localStorage.key(i);
      if(k&&k.startsWith(pre)) out.push(k.slice(4));} return {keys:out,prefix}; }
};
const J = {
  get(key,fallback){ const r=window.storage.get(key); if(!r) return fallback;
    try{return JSON.parse(r.value);}catch{return fallback;} },
  set(key,obj){ window.storage.set(key, JSON.stringify(obj)); }
};

/* ============================================================
   Config + state
   ============================================================ */
const ADMIN_PASSCODE = "dewdOpepen082";   // admin passcode
const DEFAULT_DURATION = 90;              // voting window, minutes

const TICKER_ITEMS = [
  "YOUR BRAND HERE","THIS TICKER Ξ0.69 PER WEEK","4,416 ACTIVE PLAYERS",
  "CHOOSE YOUR FAVORITE OPEPEN","OPEPENWC26/SPONSOR"
];

function defaultMatch(){
  return {
    id:"m"+Date.now(),
    edition:40,
    title:"Which Opepen wins?",
    leftImg:null, rightImg:null,
    startTime:Date.now(),
    durationMin:DEFAULT_DURATION,
    seedLeft:0, seedRight:0
  };
}
function getMatch(){
  let m=J.get("match",null);
  if(!m){ m=defaultMatch(); J.set("match",m); }
  return m;
}
function getIdentity(){ return J.get("identity",null); }
function setIdentity(id){ J.set("identity",id); }
function clearIdentity(){ window.storage.delete("identity"); }

/* votes for a match: { identityId: {side, firstTs, voteTs, changes} } */
function votesKey(mId){ return "votes:"+mId; }
function getVotes(mId){ return J.get(votesKey(mId), {}); }
function setVotes(mId,v){ J.set(votesKey(mId), v); }

function tally(m){
  const v=getVotes(m.id);
  let left=m.seedLeft||0, right=m.seedRight||0;
  Object.values(v).forEach(x=>{ if(x.side==="LFT") left++; else if(x.side==="RGT") right++; });
  return {left,right,total:left+right};
}
function matchEnded(m){ return Date.now() >= m.startTime + m.durationMin*60000; }
function myVote(m){ const id=getIdentity(); if(!id) return null;
  return getVotes(m.id)[id.id]||null; }

function castVote(m, side){
  const id=getIdentity(); if(!id) return;
  const v=getVotes(m.id);
  const now=Date.now();
  if(v[id.id]){
    if(v[id.id].side!==side){ v[id.id].side=side; v[id.id].changes=(v[id.id].changes||0)+1;
      v[id.id].voteTs=now; }
  } else {
    v[id.id]={side, firstTs:now, voteTs:now, changes:0};
  }
  setVotes(m.id,v);
}

/* ============================================================
   Small DOM helpers
   ============================================================ */
function el(html){ const t=document.createElement("template"); t.innerHTML=html.trim(); return t.content.firstElementChild; }
function fmtClock(totalSec){
  totalSec=Math.max(0,Math.floor(totalSec));
  const mm=Math.floor(totalSec/60), ss=totalSec%60;
  return String(mm).padStart(2,"0")+":"+String(ss).padStart(2,"0");
}
function nFmt(n){ return n.toLocaleString("en-US"); }
function toast(msg){ const t=document.getElementById("toast"); t.textContent=msg;
  t.classList.add("show"); clearTimeout(t._t); t._t=setTimeout(()=>t.classList.remove("show"),2200); }
function flash(msg){ const f=document.getElementById("flash"); f.textContent=msg;
  f.classList.add("show"); clearTimeout(f._t); f._t=setTimeout(()=>f.classList.remove("show"),2600); }

/* Soccer pitch SVG overlay (white markings on transparent) */
function pitchSVG(){
  // Frame geometry from uploaded field.svg (viewBox 1216 x 541)
  return `<svg class="pitch-svg" viewBox="0 0 1216 541" preserveAspectRatio="none" aria-hidden="true">
    <g fill="none" stroke="var(--pitch)" stroke-width="1.5" stroke-miterlimit="10">
      <rect x="68" y=".5" width="540" height="540"/>
      <rect x="608" y=".5" width="540" height="540"/>
      <circle cx="608" cy="270.5" r="135"/>
      <rect x="68" y="135.5" width="135" height="270"/>
      <rect x=".5" y="203" width="67.5" height="135"/>
      <rect x="1148" y="203" width="67.5" height="135"/>
      <rect x="1013" y="135.5" width="135" height="270"/>
      <path d="M203,203h0v135h0c37.28,0,67.5-30.22,67.5-67.5h0c0-37.28-30.22-67.5-67.5-67.5Z"/>
      <path d="M1013,338h0v-135h0c-37.28,0-67.5,30.22-67.5,67.5h0c0,37.28,30.22,67.5,67.5,67.5Z"/>
    </g>
  </svg>`;
}

/* ============================================================
   TICKER
   ============================================================ */
function renderTicker(){
  const track=document.getElementById("ticker");
  const one = TICKER_ITEMS.map(t=>`<span><a href="#/sponsor">${t}</a></span><span class="dot">·</span>`).join("");
  track.innerHTML = one+one+one+one; // duplicated for seamless 50% loop
}

/* ============================================================
   NAV
   ============================================================ */
function renderNav(route){
  const id=getIdentity();
  const items=[
    id? {h:"#/account", t:id.short||"Account"} : {h:"#/login", t:"Login"},
    {h:"#/results", t:"Results"},
    {h:"#/about", t:"About"},
    {h:"#/sponsor", t:"Sponsor"}
  ];
  document.getElementById("nav").innerHTML = items.map(i=>
    `<a href="${i.h}" class="${route.startsWith(i.h)?'active':''}">${i.t}</a>`).join("");
}

/* ============================================================
   VIEWS
   ============================================================ */
let clockTimer=null;
function clearClock(){ if(clockTimer){clearInterval(clockTimer);clockTimer=null;} }

function viewVote(app){
  const m=getMatch();
  const ended=matchEnded(m);
  if(ended){ location.hash="#/results"; return; }

  const half=(img,label)=> img
    ? `<div class="pitch-half" style="flex:1;background-image:url('${img}')"></div>`
    : `<div class="pitch-half" style="flex:1"><div class="empty-half">${label}<br>— upload in admin —</div></div>`;

  app.innerHTML = `
    <div class="edition">Edition ${m.edition}</div>
    <h1 class="page-title">${m.title}</h1>
    <p class="page-sub">Vote for which Opepen you like more</p>
    <div class="pitch-wrap votable" id="pitch">
      <div class="pitch-imgs" id="imgs" style="left:5.59%;right:5.59%">${half(m.leftImg,"LEFT OPEPEN")}${half(m.rightImg,"RIGHT OPEPEN")}</div>
      ${pitchSVG()}
      <div class="vote-zones">
        <div class="vote-zone" data-side="LFT" title="Vote left"></div>
        <div class="vote-zone" data-side="RGT" title="Vote right"></div>
      </div>
    </div>
    <div class="scoreboard">
      <div class="box">
        <div class="sb-side btn" data-side="LFT"><span class="lbl">LFT</span></div>
        <div class="sb-mid"><span class="cap">90 minutes to vote</span><span class="clock" id="clock">--:--</span></div>
        <div class="sb-side btn" data-side="RGT"><span class="lbl">RGT</span></div>
      </div>
    </div>
    <p class="page-sub" id="voteState" style="margin-top:26px"></p>
  `;

  // hover dim opposite side
  const imgs=app.querySelector("#imgs");
  const halves=imgs.querySelectorAll(".pitch-half");
  app.querySelectorAll(".vote-zone").forEach((z,i)=>{
    z.addEventListener("mouseenter",()=>{ halves.forEach((h,j)=> h.style.opacity = j===i?"1":".55"); });
    z.addEventListener("mouseleave",()=>{ halves.forEach(h=> h.style.opacity="1"); });
  });

  function attemptVote(side){
    if(!m.leftImg||!m.rightImg){ flash("No matchup set yet — add images in Admin."); return; }
    if(!getIdentity()){ openCheckIn(()=>doVote(side)); return; }
    doVote(side);
  }
  function doVote(side){
    castVote(getMatch(), side);
    toast(side==="LFT"?"Voted ← left":"Voted right →");
    location.hash="#/results";
  }
  app.querySelectorAll("[data-side]").forEach(b=>
    b.addEventListener("click",()=>attemptVote(b.dataset.side)));

  // existing vote indicator
  const mv=myVote(m);
  const vs=app.querySelector("#voteState");
  if(mv){ vs.textContent = "You voted "+(mv.side==="LFT"?"left":"right")+" — tap the other side to change"; }
  else if(getIdentity()){ vs.textContent = "Checked in as "+(getIdentity().label||"player")+" — cast your vote"; }
  else { vs.innerHTML = `<a href="#/login" style="color:var(--fg);text-decoration:underline">Check in</a> to vote`; }

  // live clock (counts down from duration)
  clearClock();
  function tick(){
    const remain=(m.startTime+m.durationMin*60000-Date.now())/1000;
    const c=app.querySelector("#clock"); if(!c) return clearClock();
    c.textContent = fmtClock(remain);
    if(remain<=0){ clearClock(); location.hash="#/results"; }
  }
  tick(); clockTimer=setInterval(tick,1000);
}

function viewResults(app){
  const m=getMatch();
  const t=tally(m);
  const ended=matchEnded(m);
  const winner = t.left===t.right ? null : (t.left>t.right?"LFT":"RGT");
  const winImg = winner==="LFT"?m.leftImg : winner==="RGT"?m.rightImg : (m.leftImg||m.rightImg);

  const dots=(color,count)=>{ let s=""; const n=Math.min(11,Math.max(0,count));
    for(let i=0;i<n;i++){ const x=8+Math.random()*22, y=8+Math.random()*64;
      s+=`<circle cx="${x}" cy="${y}" r="2.4" fill="${color}"/>`; } return s; };

  app.innerHTML = `
    <h1 class="page-title">Results</h1>
    <p class="page-sub">See which Opepen moves on to the next round</p>
    <div class="pitch-wrap" id="pitch">
      <div class="pitch-imgs" style="justify-content:center;align-items:center">
        ${winImg
          ? `<div class="pitch-half" style="height:62%;aspect-ratio:1;background-image:url('${winImg}')"></div>`
          : `<div class="pitch-half" style="height:62%;aspect-ratio:1"><div class="empty-half">No matchup yet</div></div>`}
      </div>
      ${pitchSVG()}
      <svg class="pitch-svg" viewBox="0 0 1216 541" preserveAspectRatio="none">
        <g transform="translate(8,210)">${dots("#16b566",Math.round(t.left/Math.max(1,t.total)*11))}</g>
        <g transform="translate(1156,210)">${dots("#ff3b30",Math.round(t.right/Math.max(1,t.total)*11))}</g>
      </svg>
    </div>
    <div class="result-bar">
      <div class="cell left ${winner==='LFT'?'win':''}" style="${winner==='LFT'?'':'background:#000'}">
        <div class="lbl" style="${winner==='LFT'?'':'color:var(--fg)'}">Left</div>
        <div class="num" style="${winner==='LFT'?'':'color:var(--fg)'}">${nFmt(t.left)}</div>
      </div>
      <div class="cell right ${winner==='RGT'?'win':''}" style="${winner==='RGT'?'background:var(--green)':'background:#000'}">
        <div class="lbl" style="${winner==='RGT'?'color:#001a0e':'color:var(--red)'}">RGT</div>
        <div class="num" style="${winner==='RGT'?'color:#001a0e':'color:var(--red)'}">${nFmt(t.right)}</div>
      </div>
    </div>
    <p class="page-sub" style="margin-top:28px">
      ${ended? "Full time" : "Voting open"} ·
      <a href="#/stats" style="color:var(--fg);text-decoration:underline">Match stats</a>
      ${ended? "" : ` · <a href="#/" style="color:var(--fg);text-decoration:underline">Back to vote</a>`}
    </p>
  `;
}

function viewStats(app){
  const m=getMatch();
  const t=tally(m);
  const v=getVotes(m.id);
  const arr=Object.values(v);
  const totalLocal=arr.length;
  // average vote speed: time between first seen and vote (local votes only)
  let avg=10;
  if(totalLocal){ const secs=arr.map(x=>Math.max(1,(x.voteTs-x.firstTs)/1000));
    avg=Math.round(secs.reduce((a,b)=>a+b,0)/secs.length) || 10; }
  const changes=arr.reduce((a,x)=>a+(x.changes||0),0);
  const winImg = t.left>=t.right ? (m.leftImg||m.rightImg) : (m.rightImg||m.leftImg);

  app.innerHTML = `
    <h1 class="page-title">Match Stats</h1>
    <p class="page-sub">See the results from the voting match</p>
    <div class="pitch-wrap" id="pitch">
      <div class="pitch-imgs" style="justify-content:center;align-items:center">
        ${winImg
          ? `<div class="pitch-half" style="height:62%;aspect-ratio:1;background-image:url('${winImg}')"></div>`
          : `<div class="pitch-half" style="height:62%;aspect-ratio:1"><div class="empty-half">No matchup yet</div></div>`}
      </div>
      ${pitchSVG()}
      <div class="stats-overlay">
        <table>
          <tr><td class="k">Total Votes:</td><td class="v">${nFmt(t.total)}</td></tr>
          <tr><td class="k">Average Vote Speed:</td><td class="v">${avg} seconds</td></tr>
          <tr><td class="k">Vote Changes:</td><td class="v">${nFmt(changes)}</td></tr>
        </table>
      </div>
    </div>
    <div class="result-bar">
      <div class="cell left ${t.left>=t.right?'win':''}" style="${t.left>=t.right?'':'background:#000'}">
        <div class="lbl" style="${t.left>=t.right?'':'color:var(--fg)'}">Left</div>
        <div class="num" style="${t.left>=t.right?'':'color:var(--fg)'}">${nFmt(t.left)}</div>
      </div>
      <div class="cell right" style="${t.right>t.left?'background:var(--green)':'background:#000'}">
        <div class="lbl" style="${t.right>t.left?'color:#001a0e':'color:var(--red)'}">RGT</div>
        <div class="num" style="${t.right>t.left?'color:#001a0e':'color:var(--red)'}">${nFmt(t.right)}</div>
      </div>
    </div>
    <p class="page-sub" style="margin-top:28px">
      <a href="#/results" style="color:var(--fg);text-decoration:underline">Back to results</a>
    </p>
  `;
}

/* ---------- Account ---------- */
function viewAccount(app){
  const id=getIdentity();
  if(!id){ location.hash="#/login"; return; }
  app.innerHTML=`
    <h1 class="page-title">Account</h1>
    <p class="page-sub">You are checked in</p>
    <div style="max-width:420px;margin:0 auto;text-align:center">
      <p class="who" style="font-size:13px;margin-bottom:6px">${id.type==='wallet'?'WALLET':'EMAIL'}</p>
      <p style="font-family:var(--mono);font-size:15px;word-break:break-all;margin-bottom:26px">${id.label}</p>
      <button class="btn-ghost" id="signout">Sign out</button>
    </div>`;
  app.querySelector("#signout").onclick=()=>{ clearIdentity(); flash("Signed out"); location.hash="#/"; };
}

/* ---------- Admin ---------- */
function viewAdmin(app){
  const ok = sessionStorage.getItem("owc_admin")==="1";
  if(!ok){
    const entry = window.prompt("Enter admin passcode");
    if(entry===null){ location.hash="#/"; return; }          // cancelled
    if(entry===ADMIN_PASSCODE){ sessionStorage.setItem("owc_admin","1"); }
    else { flash("Wrong passcode"); location.hash="#/"; return; }
  }

  const m=getMatch();
  app.innerHTML=`<h1 class="page-title">Admin</h1>
    <p class="page-sub">Set up the current matchup</p>
    <div class="admin">
      <div class="row">
        <div><label>Edition</label><input type="number" id="ed" value="${m.edition}"></div>
        <div><label>Voting window (minutes)</label><input type="number" id="dur" value="${m.durationMin}"></div>
      </div>
      <label>Match title</label>
      <input type="text" id="title" value="${m.title.replace(/"/g,'&quot;')}">
      <div class="row">
        <div>
          <label>Left Opepen image</label>
          <input type="file" id="leftFile" accept="image/*">
          <div class="thumb" id="leftThumb" style="${m.leftImg?`background-image:url('${m.leftImg}')`:''}">${m.leftImg?'':'no image'}</div>
        </div>
        <div>
          <label>Right Opepen image</label>
          <input type="file" id="rightFile" accept="image/*">
          <div class="thumb" id="rightThumb" style="${m.rightImg?`background-image:url('${m.rightImg}')`:''}">${m.rightImg?'':'no image'}</div>
        </div>
      </div>
      <div class="row">
        <div><label>Seed left votes (optional)</label><input type="number" id="sl" value="${m.seedLeft||0}"></div>
        <div><label>Seed right votes (optional)</label><input type="number" id="sr" value="${m.seedRight||0}"></div>
      </div>
      <div class="actions">
        <button class="btn-primary" id="save">Save & start new match</button>
        <button class="btn-ghost" id="resetVotes">Reset votes</button>
      </div>
      <div class="actions">
        <button class="btn-ghost" id="signout">Lock admin</button>
      </div>
      <p class="note">Saving stores the matchup in this browser and restarts the ${'`'}90:00${'`'} clock. In the deployed (Supabase) build this writes to the shared store so every voter sees the same matchup.</p>
    </div>`;

  let leftImg=m.leftImg, rightImg=m.rightImg;
  function hookFile(inputId, thumbId, set){
    app.querySelector("#"+inputId).addEventListener("change",e=>{
      const f=e.target.files[0]; if(!f) return;
      const r=new FileReader();
      r.onload=()=>{ set(r.result);
        const th=app.querySelector("#"+thumbId);
        th.style.backgroundImage=`url('${r.result}')`; th.textContent=""; };
      r.readAsDataURL(f);
    });
  }
  hookFile("leftFile","leftThumb",v=>leftImg=v);
  hookFile("rightFile","rightThumb",v=>rightImg=v);

  app.querySelector("#save").onclick=()=>{
    const nm={
      id:"m"+Date.now(),
      edition:parseInt(app.querySelector("#ed").value)||m.edition,
      title:app.querySelector("#title").value||"Which Opepen wins?",
      leftImg, rightImg,
      startTime:Date.now(),
      durationMin:parseInt(app.querySelector("#dur").value)||DEFAULT_DURATION,
      seedLeft:parseInt(app.querySelector("#sl").value)||0,
      seedRight:parseInt(app.querySelector("#sr").value)||0
    };
    J.set("match",nm);
    toast("Match published");
    location.hash="#/";
  };
  app.querySelector("#resetVotes").onclick=()=>{
    window.storage.delete(votesKey(m.id)); toast("Votes reset"); viewAdmin(app);
  };
  app.querySelector("#signout").onclick=()=>{ sessionStorage.removeItem("owc_admin"); viewAdmin(app); };
}

/* ============================================================
   CHECK-IN MODAL (magic link + wallet)
   ============================================================ */
function closeModal(){ document.getElementById("modalRoot").innerHTML=""; }
function openCheckIn(onDone){
  const root=document.getElementById("modalRoot");
  const m=el(`<div class="modal-bg"><div class="modal">
    <button class="close" title="Close">×</button>
    <h2>Check in to vote</h2>
    <p class="lead">One verdict per match. Choose how you'd like to check in.</p>
    <div id="step"></div>
  </div></div>`);
  root.innerHTML=""; root.appendChild(m);
  m.querySelector(".close").onclick=closeModal;
  m.addEventListener("click",e=>{ if(e.target===m) closeModal(); });
  const step=m.querySelector("#step");

  function finish(identity){
    setIdentity(identity); closeModal(); flash("Checked in as "+identity.label);
    renderNav(location.hash); if(onDone) onDone();
  }

  function chooser(){
    step.innerHTML=`
      <label>Email magic link</label>
      <input type="email" id="email" placeholder="you@email.com" autocomplete="email">
      <div class="err" id="emErr" style="display:none"></div>
      <button class="btn-primary" id="sendLink">Send magic link</button>
      <div class="divider">OR</div>
      <button class="btn-ghost" id="wallet">Connect wallet</button>
      <p class="note">Email sends a one-time sign-in link. Wallet asks you to sign a message — no transaction, no gas, and we never see your keys.</p>`;
    step.querySelector("#sendLink").onclick=sendLink;
    step.querySelector("#wallet").onclick=connectWallet;
    step.querySelector("#email").addEventListener("keydown",e=>{if(e.key==="Enter")sendLink();});
  }

  function sendLink(){
    const email=step.querySelector("#email").value.trim();
    const err=step.querySelector("#emErr");
    if(!/^[^@\s]+@[^@\s]+\.[^@\s]+$/.test(email)){ err.style.display="block"; err.textContent="Enter a valid email address"; return; }
    // No mail server in this self-contained build: simulate the magic-link round-trip.
    const token=Math.random().toString(36).slice(2,8).toUpperCase();
    step.innerHTML=`
      <p class="lead" style="margin-bottom:18px">We sent a magic link to <b style="color:var(--fg)">${email}</b>. Open it to finish checking in.</p>
      <button class="btn-primary" id="useLink">Open magic link →</button>
      <button class="btn-ghost" id="back" style="margin-top:12px">Use a different method</button>
      <p class="note">Demo note: this single-file build has no mail server, so the link is simulated here (token ${token}). The deployed Supabase build emails a real link that lands the user back on this screen, checked in.</p>`;
    step.querySelector("#useLink").onclick=()=>finish({type:"email",id:"e:"+email.toLowerCase(),label:email,short:email.split("@")[0]});
    step.querySelector("#back").onclick=chooser;
  }

  async function connectWallet(){
    if(!window.ethereum){
      step.innerHTML=`<p class="lead" style="margin-bottom:18px">No browser wallet detected. Install a wallet like MetaMask, Rabby, or Coinbase Wallet, then try again.</p>
        <button class="btn-ghost" id="back">Back</button>
        <p class="note">A wallet extension exposes <code>window.ethereum</code>, which this app uses to request your address and a signature.</p>`;
      step.querySelector("#back").onclick=chooser; return;
    }
    try{
      step.innerHTML=`<p class="lead">Check your wallet to approve the connection and sign…</p>`;
      const accounts=await window.ethereum.request({method:"eth_requestAccounts"});
      const addr=accounts[0];
      const nonce=Math.random().toString(36).slice(2,10);
      const msg=`Opepen World Cup check-in\nAddress: ${addr}\nNonce: ${nonce}`;
      await window.ethereum.request({method:"personal_sign",params:[msg,addr]});
      const short=addr.slice(0,6)+"…"+addr.slice(-4);
      finish({type:"wallet",id:"w:"+addr.toLowerCase(),label:short,short});
    }catch(err){
      step.innerHTML=`<p class="lead" style="margin-bottom:18px">Wallet check-in was cancelled or failed.</p>
        <button class="btn-ghost" id="back">Try again</button>`;
      step.querySelector("#back").onclick=chooser;
    }
  }

  chooser();
}

/* ============================================================
   ROUTER
   ============================================================ */
function render(){
  clearClock();
  const app=document.getElementById("app");
  const hash=location.hash||"#/";
  renderNav(hash);
  closeModal();

  if(hash==="#/"||hash==="") return viewVote(app);
  if(hash.startsWith("#/login")){
    if(getIdentity()){ location.hash="#/account"; return; }
    viewVote(app); openCheckIn(()=>{ location.hash="#/"; }); return;
  }
  if(hash.startsWith("#/account")) return viewAccount(app);
  if(hash.startsWith("#/results")) return viewResults(app);
  if(hash.startsWith("#/stats")) return viewStats(app);
  if(hash.startsWith("#/about")) return viewAbout(app);
  if(hash.startsWith("#/sponsor")) return viewSponsor(app);
  if(hash.startsWith("#/terms")) return viewTerms(app);
  if(hash.startsWith("#/privacy")) return viewPrivacy(app);
  if(hash.startsWith("#/admin")) return viewAdmin(app);
  return viewVote(app);
}

renderTicker();
window.addEventListener("hashchange",render);
render();
</script>
